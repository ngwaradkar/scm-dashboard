<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plan vs Actual March 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #ffffff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* HIDDEN 4K EXPORT ENGINE - Widened to 550px to prevent text clipping */
        #hd-export-root {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 550px;
            background: #ffffff;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .ach-badge {
            background: #eff6ff;
            color: #1e40af;
            font-weight: 900;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 99px;
            border: 1.5px solid #dbeafe;
        }
    </style>
</head>
<body class="overflow-hidden bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState('');
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isSaved, setIsSaved] = useState(false);
            const [sharing, setSharing] = useState(false);

            useEffect(() => {
                const savedKey = localStorage.getItem('scm_prod_v15_hd');
                if (savedKey) {
                    setApiKey(savedKey);
                    setIsSaved(true);
                }
            }, []);

            const saveKey = () => {
                if (!apiKey) return;
                localStorage.setItem('scm_prod_v15_hd', apiKey);
                setIsSaved(true);
            };

            const clearKey = () => {
                localStorage.removeItem('scm_prod_v15_hd');
                setApiKey('');
                setIsSaved(false);
            };

            const sampleData = {
                title: "PLAN VS ACTUAL",
                subTitle: "MARCH 2026",
                reportDate: "5-Mar",
                items: [
                    { name: "MACHINING/ABB", plan: 3113817, daily: 112435, cumm: 379488, mtd: 94872, askingRate: 136716 },
                    { name: "Bearings To Supa", plan: 1180079, daily: 74369, cumm: 122594, mtd: 30649, askingRate: 50356 },
                    { name: "Bearings To FC", plan: 3118119, daily: 114947, cumm: 317422, mtd: 79356, askingRate: 133367 },
                    { name: "Bearings To FG", plan: 1297073, daily: 80327, cumm: 86519, mtd: 21630, askingRate: 57645 }
                ],
                pendingVisual: 118656
            };

            const current = data || sampleData;

            const daysRemaining = useMemo(() => {
                const dayMatch = current.reportDate.match(/(\d+)/);
                const dayNum = dayMatch ? parseInt(dayMatch[0]) : 5;
                return 26 - dayNum;
            }, [current.reportDate]);

            const generateShare = async () => {
                if (sharing) return;
                setSharing(true);
                try {
                    const element = document.getElementById('hd-export-root');
                    
                    // html2canvas set to scale 4 for Ultra HD 4K quality
                    const canvas = await html2canvas(element, {
                        scale: 4,
                        useCORS: true,
                        backgroundColor: '#ffffff',
                        logging: false,
                        width: 550,
                        height: element.offsetHeight
                    });
                    
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png', 1.0));
                    const file = new File([blob], `SCM_4K_Report_${current.reportDate}.png`, { type: 'image/png' });

                    if (navigator.share) {
                        await navigator.share({
                            files: [file],
                            title: `Ultra-HD Production Report - ${current.reportDate}`,
                            text: `SCM Update: ${current.reportDate} | Days Left: ${daysRemaining}`
                        });
                    } else {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `SCM_HD_Report_${current.reportDate}.png`;
                        a.click();
                    }
                } catch (err) {
                    alert("Ultra-HD generation failed. Check your browser permissions.");
                } finally {
                    setSharing(false);
                }
            };

            const processImage = async (e) => {
                const file = e.target.files[0];
                if (!file || !apiKey) return;
                setLoading(true);
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    try {
                        const prompt = `Extract production data JSON: {reportDate, items:[{name, plan, daily, cumm, mtd, askingRate}], pendingVisual}. 'daily' is date column value. 'cumm' is 'Cumm ACH'. Order strictly: Machining, Supa, FC, FG. Return ONLY valid JSON.`;
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64 } }] }] })
                        });
                        const result = await res.json();
                        const text = result.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                        setData(JSON.parse(text));
                    } catch (err) { alert("Data extraction failed. Please use a clearer photo."); } finally { setLoading(false); }
                };
                reader.readAsDataURL(file);
            };

            const ProductCard = ({ item, isExport = false }) => (
                <div className={`bg-white rounded-[32px] border border-slate-200 p-5 shadow-sm flex flex-col gap-4 ${isExport ? 'w-full' : ''}`}>
                    <div className="flex justify-between items-center">
                        <h3 className={`${isExport ? 'text-[18px]' : 'text-[14px]'} font-black text-slate-800 uppercase tracking-tight`}>{item.name}</h3>
                        <div className="ach-badge uppercase">
                            {((item.cumm / item.plan) * 100).toFixed(1)}% ACH
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-x-8 gap-y-4">
                        <div className="flex flex-col">
                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter mb-1">Plan Target</span>
                            <span className={`${isExport ? 'text-[20px]' : 'text-[16px]'} font-black text-slate-700`}>{item.plan.toLocaleString()}</span>
                        </div>
                        <div className="flex flex-col border-l border-slate-100 pl-6">
                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter mb-1">{current.reportDate} Actual</span>
                            <span className={`${isExport ? 'text-[20px]' : 'text-[16px]'} font-black text-emerald-600`}>+{item.daily.toLocaleString()}</span>
                        </div>
                        <div className="flex flex-col">
                            <span className="text-[10px] font-bold text-blue-400 uppercase tracking-tighter mb-1">Cumulative Ach.</span>
                            <span className={`${isExport ? 'text-[20px]' : 'text-[16px]'} font-black text-blue-600`}>{item.cumm.toLocaleString()}</span>
                        </div>
                        <div className="flex flex-col border-l border-slate-100 pl-6">
                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter mb-1">MTD Average</span>
                            <span className={`${isExport ? 'text-[20px]' : 'text-[16px]'} font-black text-slate-700`}>{item.mtd.toLocaleString()}</span>
                        </div>
                        <div className="col-span-2 bg-slate-50 rounded-[20px] px-5 py-3 flex justify-between items-center border border-slate-100 mt-1">
                            <span className="text-[10px] font-bold text-orange-500 uppercase tracking-tighter font-black">Asking Rate Required</span>
                            <div className="flex items-baseline gap-1">
                                <span className={`${isExport ? 'text-[22px]' : 'text-[18px]'} font-black text-orange-600 tracking-tighter leading-none`}>{item.askingRate.toLocaleString()}</span>
                                <span className="text-[10px] font-black text-orange-400 uppercase">u/day</span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex flex-col overflow-hidden max-w-md mx-auto bg-white border-x border-slate-200 shadow-2xl">
                    
                    {/* UI Header */}
                    <header className="px-5 pt-6 pb-4 bg-white border-b border-slate-200 shrink-0">
                        <div className="flex justify-between items-start">
                            <div className="flex-1 mr-4">
                                <h1 className="text-xl font-black text-slate-900 leading-none uppercase tracking-tighter">{current.title}</h1>
                                <p className="text-blue-600 text-[10px] font-black mt-1 uppercase tracking-widest leading-none">{current.subTitle}</p>
                                <div className="mt-3 flex items-center bg-slate-50 border border-slate-200 rounded-lg px-2 h-8 focus-within:ring-1 ring-blue-500 transition-all">
                                    <i data-lucide="key" className={`w-3.5 h-3.5 mr-2 ${isSaved ? 'text-emerald-500' : 'text-slate-400'}`}></i>
                                    <input type="password" placeholder="API Key..." className="bg-transparent border-none outline-none text-[10px] w-full" value={apiKey} onChange={(e) => {setApiKey(e.target.value); setIsSaved(false);}} />
                                    {apiKey && !isSaved && <button onClick={saveKey} className="text-blue-600 px-1 hover:scale-110"><i data-lucide="save" className="w-4 h-4"></i></button>}
                                    {isSaved && <button onClick={clearKey} className="text-slate-400 px-1 hover:text-red-500 transition-colors"><i data-lucide="trash-2" className="w-4 h-4"></i></button>}
                                </div>
                            </div>
                            <div className="flex gap-2 pt-1">
                                <button onClick={generateShare} className="p-3 bg-emerald-50 text-emerald-600 rounded-2xl border border-emerald-100 active:scale-95 transition-all shadow-sm" disabled={sharing}>
                                    {sharing ? <div className="w-5 h-5 border-2 border-emerald-600 border-t-transparent rounded-full animate-spin"></div> : <i data-lucide="share-2" className="w-5 h-5"></i>}
                                </button>
                                <label className={`p-3 rounded-2xl shadow-lg transition-all cursor-pointer active:scale-95 ${apiKey ? 'bg-blue-600 shadow-blue-200' : 'bg-slate-300 opacity-50 cursor-not-allowed'}`}>
                                    <i data-lucide="camera" className="w-5 h-5 text-white"></i>
                                    <input type="file" className="hidden" onChange={processImage} disabled={!apiKey} />
                                </label>
                            </div>
                        </div>
                    </header>

                    {loading ? (
                        <div className="flex-1 flex flex-col items-center justify-center bg-white">
                            <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                            <p className="mt-4 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] animate-pulse">Syncing Factory Ledger...</p>
                        </div>
                    ) : (
                        <main className="flex-1 flex flex-col p-3 gap-2 overflow-hidden bg-slate-50">
                            <div className="flex bg-white rounded-2xl border border-slate-200 px-4 h-12 items-center justify-between shadow-sm shrink-0">
                                <div className="flex items-center gap-3">
                                    <i data-lucide="calendar" className="w-5 h-5 text-blue-600"></i>
                                    <span className="text-[15px] font-black text-slate-800 tracking-tighter">{current.reportDate}</span>
                                </div>
                                <div className="h-5 w-px bg-slate-200"></div>
                                <div className="flex items-center gap-2.5">
                                    <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.4)]"></div>
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Live Sync</span>
                                </div>
                            </div>

                            <div className="flex-1 flex flex-col gap-2 overflow-y-auto no-scrollbar pb-1">
                                {current.items.map((item, i) => <ProductCard key={i} item={item} />)}
                                
                                {/* Bottom Summary Boxes */}
                                <div className="grid grid-cols-2 gap-2 mt-1 shrink-0 pb-6">
                                    <div className="bg-white border-2 border-orange-100 rounded-[28px] p-4 flex flex-col justify-center shadow-sm h-[75px]">
                                        <span className="text-[9px] font-bold text-orange-400 uppercase tracking-tight leading-none mb-1">Visual Packing Pending</span>
                                        <div className="text-[20px] font-black text-orange-600 leading-none">{current.pendingVisual.toLocaleString()} <span className="text-[10px]">u</span></div>
                                    </div>
                                    <div className="bg-slate-900 rounded-[28px] p-4 flex flex-col justify-center shadow-xl h-[75px]">
                                        <span className="text-[9px] font-bold text-slate-400 uppercase tracking-tight leading-none mb-1">Working Days Left</span>
                                        <div className="text-[20px] font-black text-white leading-none">{daysRemaining} Days</div>
                                    </div>
                                </div>
                            </div>
                        </main>
                    )}

                    {/* HIDDEN 4K EXPORT TEMPLATE - Optimized for Perfect Sharing */}
                    <div id="hd-export-root">
                        <div className="border-b-[6px] border-slate-900 pb-6 flex justify-between items-end">
                            <div>
                                <h1 className="text-[42px] font-black text-slate-900 uppercase tracking-tighter leading-none">{current.title}</h1>
                                <p className="text-blue-600 font-black text-[14px] uppercase tracking-[0.3em] mt-2">{current.subTitle}</p>
                            </div>
                            <div className="text-right">
                                <span className="text-[14px] font-black text-slate-400 uppercase tracking-widest italic">STATUS DATE: {current.reportDate}</span>
                            </div>
                        </div>
                        
                        <div className="flex flex-col gap-5">
                            {current.items.map((item, i) => <ProductCard key={i} item={item} isExport={true} />)}
                        </div>

                        <div className="grid grid-cols-2 gap-5 pt-2">
                            <div className="bg-white border-[3px] border-orange-100 rounded-[40px] p-8 flex flex-col justify-center shadow-sm">
                                <span className="text-[14px] font-black text-orange-400 uppercase mb-2">Visual Packing Pending</span>
                                <div className="text-[36px] font-black text-orange-600 leading-none">{current.pendingVisual.toLocaleString()} Units</div>
                            </div>
                            <div className="bg-slate-900 rounded-[40px] p-8 flex flex-col justify-center shadow-2xl">
                                <span className="text-[14px] font-black text-slate-500 uppercase mb-2">Remaining Capacity</span>
                                <div className="text-[36px] font-black text-white leading-none">{daysRemaining} Days Left</div>
                            </div>
                        </div>

                        <div className="mt-8 pt-8 border-t-[3px] border-slate-100 flex justify-between items-center opacity-40">
                            <span className="text-[14px] font-black text-slate-400 uppercase tracking-widest leading-none">Production Insight AI v2.5</span>
                            <span className="text-[14px] font-black text-slate-400 uppercase tracking-[0.4em]">MARCH 2026</span>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
