<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plan vs Actual March 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #ffffff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 4K EXPORT CONTAINER - Hidden from view, optimized for screenshot */
        #hd-export-target {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 600px; /* Wider to prevent text clipping */
            background: #ffffff;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .metric-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.02em; }
        .metric-value { font-size: 17px; font-weight: 900; color: #1e293b; line-height: 1.1; }
        .ach-tag { background: #eff6ff; color: #1e40af; font-weight: 900; font-size: 11px; padding: 3px 12px; border-radius: 99px; border: 1.5px solid #dbeafe; }
    </style>
</head>
<body class="overflow-hidden bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState('');
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isSaved, setIsSaved] = useState(false);
            const [sharing, setSharing] = useState(false);

            useEffect(() => {
                const savedKey = localStorage.getItem('scm_prod_v20_ultra');
                if (savedKey) {
                    setApiKey(savedKey);
                    setIsSaved(true);
                }
            }, []);

            const saveKey = () => {
                if (!apiKey) return;
                localStorage.setItem('scm_prod_v20_ultra', apiKey);
                setIsSaved(true);
            };

            const clearKey = () => {
                localStorage.removeItem('scm_prod_v20_ultra');
                setApiKey('');
                setIsSaved(false);
            };

            // Current 6-Mar Data from your photo
            const sampleData = {
                title: "PLAN VS ACTUAL",
                subTitle: "MARCH 2026",
                reportDate: "6-Mar",
                items: [
                    { name: "MACHINING/ABB", plan: 3113817, daily: 110173, cumm: 490021, mtd: 98004, askingRate: 138095 },
                    { name: "Bearings To Supa", plan: 1180079, daily: 44024, cumm: 166618, mtd: 33324, askingRate: 50673 },
                    { name: "Bearings To FC", plan: 3118119, daily: 131871, cumm: 449293, mtd: 89859, askingRate: 133441 },
                    { name: "Bearings To FG", plan: 1297073, daily: 29290, cumm: 115809, mtd: 23162, askingRate: 59063 }
                ],
                pendingVisual: 105141
            };

            const current = data || sampleData;

            const daysRemaining = useMemo(() => {
                const dayMatch = current.reportDate.match(/(\d+)/);
                const dayNum = dayMatch ? parseInt(dayMatch[0]) : 6;
                // Based on your 5-Mar = 21 days logic, 6-Mar is 20 days. Formula: 26 - day
                return 26 - dayNum;
            }, [current.reportDate]);

            const handleShare = async () => {
                if (sharing) return;
                setSharing(true);
                try {
                    const element = document.getElementById('hd-export-target');
                    // Scale 4 creates a True 4K resolution image (approx 2400px wide)
                    const canvas = await html2canvas(element, {
                        scale: 4, 
                        useCORS: true,
                        backgroundColor: '#ffffff'
                    });
                    
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png', 1.0));
                    const file = new File([blob], `SCM_4K_Report_${current.reportDate}.png`, { type: 'image/png' });

                    if (navigator.share) {
                        await navigator.share({
                            files: [file],
                            title: `Production Report - ${current.reportDate}`,
                            text: `Update: ${current.reportDate} | ${daysRemaining} Days Left`
                        });
                    } else {
                        const url = URL.createObjectURL(blob);
                        window.open(url, '_blank');
                    }
                } catch (err) {
                    alert("Ultra-HD export failed. Check browser permissions.");
                } finally {
                    setSharing(false);
                }
            };

            const processImage = async (e) => {
                const file = e.target.files[0];
                if (!file || !apiKey) return;
                setLoading(true);
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    try {
                        const prompt = `
                            Analyze this production table. Extract into JSON:
                            {
                              "reportDate": "string (e.g. 6-Mar)",
                              "items": [
                                {"name": "string", "plan": number, "daily": number, "cumm": number, "mtd": number, "askingRate": number}
                              ],
                              "pendingVisual": number
                            }
                            Rules:
                            1. 'daily' is the date-header column (e.g., 6-Mar).
                            2. 'cumm' is 'Cumm ACH'.
                            3. 'mtd' is 'MTD Average'.
                            4. Sequence MUST be: Machining, Supa, FC, FG.
                            5. Be resilient to glare/shadows. Return ONLY raw JSON.
                        `;

                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64 } }] }] })
                        });

                        const result = await res.json();
                        const text = result.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                        setData(JSON.parse(text));
                    } catch (err) {
                        alert("Extraction Error: Please ensure the photo is well-lit and covers the full table.");
                    } finally {
                        setLoading(false);
                    }
                };
                reader.readAsDataURL(file);
            };

            const DataCard = ({ item, isExport = false }) => (
                <div className={`bg-white rounded-2xl border border-slate-200 p-4 shadow-sm flex flex-col gap-3 ${isExport ? 'w-full' : ''}`}>
                    <div className="flex justify-between items-center">
                        <h3 className={`${isExport ? 'text-[16px]' : 'text-[13px]'} font-black text-slate-800 uppercase tracking-tight`}>{item.name}</h3>
                        <div className="ach-tag">
                            {((item.cumm / item.plan) * 100).toFixed(1)}% ACHIEVED
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-x-6 gap-y-3">
                        <div className="flex flex-col">
                            <span className="metric-label">Plan Target</span>
                            <span className={`${isExport ? 'text-[18px]' : 'text-[15px]'} font-black text-slate-700`}>{item.plan.toLocaleString()}</span>
                        </div>
                        <div className="flex flex-col border-l border-slate-100 pl-4">
                            <span className="metric-label">{current.reportDate} (Daily)</span>
                            <span className={`${isExport ? 'text-[18px]' : 'text-[15px]'} font-black text-emerald-600`}>+{item.daily.toLocaleString()}</span>
                        </div>
                        <div className="flex flex-col">
                            <span className="metric-label text-blue-400">Cumulative Ach.</span>
                            <span className={`${isExport ? 'text-[18px]' : 'text-[15px]'} font-black text-blue-600`}>{item.cumm.toLocaleString()}</span>
                        </div>
                        <div className="flex flex-col border-l border-slate-100 pl-4">
                            <span className="metric-label">MTD Average</span>
                            <span className={`${isExport ? 'text-[18px]' : 'text-[15px]'} font-black text-slate-700`}>{item.mtd.toLocaleString()}</span>
                        </div>
                        <div className="col-span-2 bg-slate-50 rounded-xl px-4 py-2 flex justify-between items-center border border-slate-100">
                            <span className="text-[10px] font-bold text-orange-500 uppercase tracking-tighter">Asking Rate Required</span>
                            <div className="flex items-baseline gap-1">
                                <span className={`${isExport ? 'text-[22px]' : 'text-[18px]'} font-black text-orange-600 tracking-tighter`}>{item.askingRate.toLocaleString()}</span>
                                <span className="text-[9px] font-black text-orange-400 uppercase">u/day</span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex flex-col overflow-hidden max-w-md mx-auto bg-white border-x border-slate-200">
                    
                    {/* Header */}
                    <header className="px-5 pt-6 pb-3 bg-white border-b border-slate-200 shrink-0 shadow-sm">
                        <div className="flex justify-between items-start">
                            <div className="flex-1 mr-4">
                                <h1 className="text-xl font-black text-slate-900 leading-none uppercase tracking-tighter">{current.title}</h1>
                                <p className="text-blue-600 text-[10px] font-black mt-1 uppercase tracking-widest">{current.subTitle}</p>
                                <div className="mt-3 flex items-center bg-slate-50 border border-slate-200 rounded-lg px-2 h-8 focus-within:ring-1 ring-blue-500">
                                    <i data-lucide="key" className={`w-3.5 h-3.5 mr-2 ${isSaved ? 'text-emerald-500' : 'text-slate-400'}`}></i>
                                    <input type="password" placeholder="Key..." className="bg-transparent border-none outline-none text-[10px] w-full" value={apiKey} onChange={(e) => {setApiKey(e.target.value); setIsSaved(false);}} />
                                    {apiKey && !isSaved && <button onClick={saveKey} className="text-blue-600 p-1"><i data-lucide="save" className="w-4 h-4"></i></button>}
                                    {isSaved && <button onClick={clearKey} className="text-slate-400 p-1 hover:text-red-500"><i data-lucide="trash-2" className="w-4 h-4"></i></button>}
                                </div>
                            </div>
                            <div className="flex gap-2 pt-1">
                                <button onClick={handleShare} className="p-3 bg-emerald-50 text-emerald-600 rounded-xl border border-emerald-100 active:scale-95 transition-all" disabled={sharing}>
                                    {sharing ? <div className="w-5 h-5 border-2 border-emerald-600 border-t-transparent rounded-full animate-spin"></div> : <i data-lucide="share-2" className="w-5 h-5"></i>}
                                </button>
                                <label className={`p-3 rounded-xl shadow-lg transition-all cursor-pointer active:scale-95 ${apiKey ? 'bg-blue-600 shadow-blue-200' : 'bg-slate-300'}`}>
                                    <i data-lucide="camera" className="w-5 h-5 text-white"></i>
                                    <input type="file" className="hidden" onChange={processImage} disabled={!apiKey} />
                                </label>
                            </div>
                        </div>
                    </header>

                    {loading ? (
                        <div className="flex-1 flex flex-col items-center justify-center bg-white p-10 text-center">
                            <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                            <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest animate-pulse">Syncing Production Data...</p>
                        </div>
                    ) : (
                        <main className="flex-1 flex flex-col p-3 gap-2 overflow-hidden bg-slate-50">
                            {/* Status Bar */}
                            <div className="flex bg-white rounded-xl border border-slate-200 px-4 h-10 items-center justify-between shadow-sm shrink-0">
                                <div className="flex items-center gap-2">
                                    <i data-lucide="calendar" className="w-4 h-4 text-blue-600"></i>
                                    <span className="text-[13px] font-black text-slate-800 tracking-tight">{current.reportDate}</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Live Sync</span>
                                </div>
                            </div>

                            {/* Data Grid */}
                            <div className="flex-1 flex flex-col gap-2 overflow-y-auto no-scrollbar">
                                {current.items.map((item, i) => <DataCard key={i} item={item} />)}
                                
                                {/* Bottom Metrics (Renamed & Compressed) */}
                                <div className="grid grid-cols-2 gap-2 mt-1 mb-4 shrink-0">
                                    <div className="bg-white border-2 border-orange-100 rounded-[24px] p-3 flex flex-col justify-center h-[65px] shadow-sm">
                                        <span className="text-[8px] font-bold text-orange-400 uppercase leading-none">Visual Packing Pending</span>
                                        <div className="text-[18px] font-black text-orange-600 mt-1 leading-none">{current.pendingVisual.toLocaleString()}</div>
                                    </div>
                                    <div className="bg-slate-900 rounded-[24px] p-3 flex flex-col justify-center h-[65px] shadow-lg shadow-slate-200">
                                        <span className="text-[8px] font-bold text-slate-400 uppercase leading-none">Remaining Capacity</span>
                                        <div className="text-[18px] font-black text-white mt-1 leading-none">{daysRemaining} Days Left</div>
                                    </div>
                                </div>
                            </div>
                        </main>
                    )}

                    {/* HIDDEN HD EXPORT TEMPLATE */}
                    <div id="hd-export-target">
                        <div className="border-b-[4px] border-slate-900 pb-4 mb-2 flex justify-between items-end">
                            <div>
                                <h1 className="text-[34px] font-black text-slate-900 uppercase tracking-tighter leading-none">{current.title}</h1>
                                <p className="text-blue-600 font-black text-[14px] uppercase tracking-[0.3em] mt-1">{current.subTitle}</p>
                            </div>
                            <div className="text-right">
                                <span className="text-[14px] font-black text-slate-400 uppercase italic">REPORT DATE: {current.reportDate}</span>
                            </div>
                        </div>
                        
                        <div className="flex flex-col gap-4">
                            {current.items.map((item, i) => <DataCard key={i} item={item} isExport={true} />)}
                        </div>

                        <div className="grid grid-cols-2 gap-4 mt-2">
                            <div className="bg-white border-[3px] border-orange-100 rounded-[32px] p-6 flex flex-col justify-center">
                                <span className="text-[12px] font-black text-orange-400 uppercase mb-1">Visual Packing Pending</span>
                                <div className="text-[28px] font-black text-orange-600 leading-none">{current.pendingVisual.toLocaleString()} Units</div>
                            </div>
                            <div className="bg-slate-900 rounded-[32px] p-6 flex flex-col justify-center">
                                <span className="text-[12px] font-black text-slate-500 uppercase mb-1">Production Capacity</span>
                                <div className="text-[28px] font-black text-white leading-none">{daysRemaining} Days Left</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
