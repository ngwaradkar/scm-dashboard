<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plan vs Actual March 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; }
        }
    </style>
</head>
<body class="bg-slate-50 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState('');
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isSaved, setIsSaved] = useState(false);

            // Load API Key from LocalStorage for daily use
            useEffect(() => {
                const savedKey = localStorage.getItem('scm_prod_key');
                if (savedKey) {
                    setApiKey(savedKey);
                    setIsSaved(true);
                }
            }, []);

            const saveKey = () => {
                if (!apiKey) return;
                localStorage.setItem('scm_prod_key', apiKey);
                setIsSaved(true);
            };

            const clearKey = () => {
                localStorage.removeItem('scm_prod_key');
                setApiKey('');
                setIsSaved(false);
            };

            // Sample data based on your last 5-Mar upload
            const sampleData = {
                title: "PLAN VS ACTUAL",
                subTitle: "MARCH 2026",
                reportDate: "5-Mar",
                items: [
                    { name: "MACHINING/ABB", plan: 3113817, daily: 112435, cumm: 379488, mtd: 94872, askingRate: 136716 },
                    { name: "Bearings To Supa", plan: 1180079, daily: 74369, cumm: 122594, mtd: 30649, askingRate: 50356 },
                    { name: "Bearings To FC", plan: 3118119, daily: 114947, cumm: 317422, mtd: 79356, askingRate: 133367 },
                    { name: "Bearings To FG", plan: 1297073, daily: 80327, cumm: 86519, mtd: 21630, askingRate: 57645 }
                ],
                pendingVisual: 118656
            };

            const current = data || sampleData;

            const processImage = async (e) => {
                const file = e.target.files[0];
                if (!file || !apiKey) return;
                
                setLoading(true);
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    try {
                        const prompt = `Extract production data from this image. JSON format: {reportDate, items:[{name, plan, daily, cumm, mtd, askingRate}], pendingVisual}. 'daily' is the value from the specific date column (e.g. 5-Mar, 6-Mar). Sort items strictly: Machining, Supa, FC, FG. Return ONLY valid JSON.`;
                        
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64 } }] }]
                            })
                        });

                        const result = await res.json();
                        const text = result.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                        setData(JSON.parse(text));
                    } catch (err) {
                        alert("Error processing image. Check your key and connection.");
                    } finally {
                        setLoading(false);
                    }
                };
                reader.readAsDataURL(file);
            };

            return (
                <div className="h-screen flex flex-col overflow-hidden max-w-md mx-auto shadow-2xl bg-slate-50 border-x border-slate-200">
                    {/* Header */}
                    <header className="px-5 pt-6 pb-4 bg-white border-b border-slate-200 shrink-0 shadow-sm no-print">
                        <div className="flex justify-between items-start">
                            <div>
                                <h1 className="text-xl font-black text-slate-800 tracking-tight leading-none uppercase">{current.title}</h1>
                                <p className="text-blue-600 text-[11px] font-black mt-1 uppercase tracking-widest">{current.subTitle}</p>
                                
                                <div className="mt-3 flex items-center bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 ring-blue-500 focus-within:ring-1">
                                    <i data-lucide="key" class={`w-3 h-3 mr-2 ${isSaved ? 'text-emerald-500' : 'text-slate-400'}`}></i>
                                    <input 
                                        type="password" 
                                        placeholder="API Key..." 
                                        className="bg-transparent border-none outline-none text-[10px] w-full"
                                        value={apiKey}
                                        onChange={(e) => {setApiKey(e.target.value); setIsSaved(false);}}
                                    />
                                    {apiKey && !isSaved && (
                                        <button onClick={saveKey} className="text-blue-600 px-1"><i data-lucide="save" class="w-3 h-3"></i></button>
                                    )}
                                    {isSaved && (
                                        <button onClick={clearKey} className="text-slate-400 px-1"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                                    )}
                                </div>
                            </div>

                            <div className="flex gap-2">
                                <button onClick={() => window.print()} className="p-3 bg-slate-100 rounded-xl active:bg-slate-200">
                                    <i data-lucide="file-down" class="w-5 h-5 text-slate-600"></i>
                                </button>
                                <label className={`p-3 rounded-xl shadow-lg transition-all cursor-pointer active:scale-95 ${apiKey ? 'bg-blue-600 shadow-blue-200' : 'bg-slate-300 opacity-50'}`}>
                                    <i data-lucide="camera" class="w-5 h-5 text-white"></i>
                                    <input type="file" className="hidden" onChange={processImage} disabled={!apiKey} />
                                </label>
                            </div>
                        </div>
                    </header>

                    {loading ? (
                        <div className="flex-1 flex flex-col items-center justify-center gap-4 bg-white/50 backdrop-blur-sm">
                            <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                            <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest animate-pulse">Processing Excel Photo...</p>
                        </div>
                    ) : (
                        <main className="flex-1 flex flex-col p-3 gap-3 overflow-hidden no-scrollbar">
                            {/* Date & Pending */}
                            <div className="flex gap-2 shrink-0 h-[8%] min-h-[50px]">
                                <div className="flex-1 bg-white rounded-2xl border border-slate-200 px-4 flex items-center gap-3">
                                    <i data-lucide="calendar" class="w-4 h-4 text-blue-500"></i>
                                    <div className="flex flex-col leading-none">
                                        <span className="text-[12px] font-black text-slate-800">{current.reportDate}</span>
                                        <span className="text-[8px] font-bold text-slate-400 uppercase mt-0.5">Report Date</span>
                                    </div>
                                </div>
                                <div className="flex-1 bg-orange-50 rounded-2xl border border-orange-100 px-4 flex items-center gap-3">
                                    <i data-lucide="alert-circle" class="w-4 h-4 text-orange-600"></i>
                                    <div className="flex flex-col leading-none">
                                        <span className="text-[12px] font-black text-orange-700">{(current.pendingVisual/1000).toFixed(1)}k</span>
                                        <span className="text-[8px] font-bold text-orange-400 uppercase mt-0.5">Pending Visual</span>
                                    </div>
                                </div>
                            </div>

                            {/* Data Grid */}
                            <div className="flex-1 grid grid-cols-1 gap-2 overflow-y-auto no-scrollbar pb-4 pr-0.5">
                                {current.items.map((item, i) => (
                                    <div key={i} className="bg-white rounded-[24px] border border-slate-200 p-4 shadow-sm flex flex-col gap-3">
                                        <h3 className="text-[13px] font-black text-slate-800 uppercase tracking-tight border-b border-slate-50 pb-2">{item.name}</h3>
                                        <div className="grid grid-cols-2 gap-x-6 gap-y-3">
                                            <div className="flex flex-col">
                                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter mb-0.5">Plan Qty</span>
                                                <span className="text-sm font-black text-slate-700">{item.plan.toLocaleString()}</span>
                                            </div>
                                            <div className="flex flex-col border-l border-slate-100 pl-4">
                                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter mb-0.5">{current.reportDate} Actual</span>
                                                <span className="text-sm font-black text-emerald-600">+{item.daily.toLocaleString()}</span>
                                            </div>
                                            <div className="flex flex-col">
                                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter mb-0.5">MTD Average</span>
                                                <span className="text-sm font-black text-blue-600">{item.mtd.toLocaleString()}</span>
                                            </div>
                                            <div className="flex flex-col border-l border-slate-100 pl-4">
                                                <span className="text-[9px] font-bold text-orange-400 uppercase tracking-tighter mb-0.5">Asking Rate</span>
                                                <span className="text-sm font-black text-orange-600">{item.askingRate.toLocaleString()}</span>
                                            </div>
                                        </div>
                                        <div className="w-full h-1.5 bg-slate-100 rounded-full mt-1 overflow-hidden">
                                            <div className="h-full bg-blue-600 rounded-full" style={{width: `${Math.min((item.cumm/item.plan)*100, 100)}%`}}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Status Footer */}
                            <div className="h-14 shrink-0 bg-slate-900 rounded-[24px] flex items-center justify-between px-6 text-white no-print">
                                <div className="flex items-center gap-3">
                                    <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                    <span className="text-[10px] font-black uppercase tracking-widest text-white">Live Sync Active</span>
                                </div>
                                <div className="text-right">
                                    <div className="text-[12px] font-black text-white">22 Days</div>
                                    <span className="text-[8px] font-bold text-slate-500 uppercase tracking-tighter">Remaining</span>
                                </div>
                            </div>
                        </main>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide icons
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
