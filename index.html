<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plan vs Actual March 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #ffffff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Hidden High-Definition Export Container */
        #export-root {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 420px;
            background: white;
            padding: 20px;
        }

        .metric-label { font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: -0.01em; }
        .metric-value { font-size: 15px; font-weight: 900; color: #1e293b; line-height: 1; }
    </style>
</head>
<body class="overflow-hidden bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState('');
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isSaved, setIsSaved] = useState(false);
            const [sharing, setSharing] = useState(false);

            useEffect(() => {
                const savedKey = localStorage.getItem('scm_prod_v12');
                if (savedKey) {
                    setApiKey(savedKey);
                    setIsSaved(true);
                }
            }, []);

            const saveKey = () => {
                if (!apiKey) return;
                localStorage.setItem('scm_prod_v12', apiKey);
                setIsSaved(true);
            };

            const clearKey = () => {
                localStorage.removeItem('scm_prod_v12');
                setApiKey('');
                setIsSaved(false);
            };

            const sampleData = {
                title: "PLAN VS ACTUAL",
                subTitle: "MARCH 2026",
                reportDate: "5-Mar",
                items: [
                    { name: "MACHINING/ABB", plan: 3113817, daily: 112435, cumm: 379488, mtd: 94872, askingRate: 136716 },
                    { name: "Bearings To Supa", plan: 1180079, daily: 74369, cumm: 122594, mtd: 30649, askingRate: 50356 },
                    { name: "Bearings To FC", plan: 3118119, daily: 114947, cumm: 317422, mtd: 79356, askingRate: 133367 },
                    { name: "Bearings To FG", plan: 1297073, daily: 80327, cumm: 86519, mtd: 21630, askingRate: 57645 }
                ],
                pendingVisual: 118656
            };

            const current = data || sampleData;

            const daysRemaining = useMemo(() => {
                const dayMatch = current.reportDate.match(/(\d+)/);
                const dayNum = dayMatch ? parseInt(dayMatch[0]) : 5;
                return 26 - dayNum;
            }, [current.reportDate]);

            const handleShare = async () => {
                if (sharing) return;
                setSharing(true);
                try {
                    const element = document.getElementById('export-root');
                    const canvas = await html2canvas(element, {
                        scale: 3,
                        useCORS: true,
                        backgroundColor: '#ffffff'
                    });
                    
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    const file = new File([blob], `SCM_Report_${current.reportDate}.png`, { type: 'image/png' });

                    if (navigator.share) {
                        await navigator.share({
                            files: [file],
                            title: `Production Report - ${current.reportDate}`,
                            text: `Update: ${current.reportDate}`
                        });
                    } else {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `Report_${current.reportDate}.png`;
                        a.click();
                    }
                } catch (err) {
                    alert("Share failed. Try again.");
                } finally {
                    setSharing(false);
                }
            };

            const processImage = async (e) => {
                const file = e.target.files[0];
                if (!file || !apiKey) return;
                setLoading(true);
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    try {
                        const prompt = `Extract production data JSON: {reportDate, items:[{name, plan, daily, cumm, mtd, askingRate}], pendingVisual}. 'daily' is date col. 'cumm' is 'Cumm ACH'. Order strictly: Machining, Supa, FC, FG. Return ONLY JSON.`;
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64 } }] }] })
                        });
                        const result = await res.json();
                        const text = result.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                        setData(JSON.parse(text));
                    } catch (err) { alert("Error reading image."); } finally { setLoading(false); }
                };
                reader.readAsDataURL(file);
            };

            const Card = ({ item }) => (
                <div className="bg-white rounded-2xl border border-slate-200 p-3 shadow-sm flex flex-col gap-2.5">
                    <div className="flex justify-between items-center">
                        <h3 className="text-[12px] font-black text-slate-800 uppercase tracking-tight truncate pr-2">{item.name}</h3>
                        <div className="px-2 py-0.5 bg-blue-50 text-[9px] font-black text-blue-600 rounded-full border border-blue-100 uppercase">
                            {((item.cumm / item.plan) * 100).toFixed(1)}% ACH
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-x-4 gap-y-2">
                        <div className="flex flex-col">
                            <span className="metric-label">Plan Target</span>
                            <span className="metric-value">{item.plan.toLocaleString()}</span>
                        </div>
                        <div className="flex flex-col border-l border-slate-100 pl-3">
                            <span className="metric-label">{current.reportDate} (Daily)</span>
                            <span className="metric-value text-emerald-600">+{item.daily.toLocaleString()}</span>
                        </div>
                        <div className="flex flex-col">
                            <span className="metric-label text-blue-500">Cumulative Ach.</span>
                            <span className="metric-value text-blue-600">{item.cumm.toLocaleString()}</span>
                        </div>
                        <div className="flex flex-col border-l border-slate-100 pl-3">
                            <span className="metric-label">MTD Average</span>
                            <span className="metric-value">{item.mtd.toLocaleString()}</span>
                        </div>
                    </div>
                    <div className="bg-slate-50 rounded-xl px-3 py-2 flex justify-between items-center border border-slate-100">
                        <span className="text-[9px] font-bold text-orange-500 uppercase tracking-tighter">Asking Rate</span>
                        <div className="flex items-baseline gap-0.5">
                            <span className="text-[16px] font-black text-orange-600 tracking-tighter leading-none">{item.askingRate.toLocaleString()}</span>
                            <span className="text-[8px] font-black text-orange-400 uppercase leading-none">u/day</span>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex flex-col overflow-hidden max-w-md mx-auto bg-white border-x border-slate-200">
                    
                    {/* Header */}
                    <header className="px-4 pt-5 pb-3 bg-white border-b border-slate-200 shrink-0">
                        <div className="flex justify-between items-start">
                            <div>
                                <h1 className="text-xl font-black text-slate-900 leading-none uppercase tracking-tighter">{current.title}</h1>
                                <p className="text-blue-600 text-[10px] font-black mt-1 uppercase tracking-widest">{current.subTitle}</p>
                                <div className="mt-2 flex items-center bg-slate-50 border border-slate-200 rounded-lg px-2 h-7 focus-within:ring-1 ring-blue-500">
                                    <i data-lucide="key" className={`w-3 h-3 mr-2 ${isSaved ? 'text-emerald-500' : 'text-slate-400'}`}></i>
                                    <input type="password" placeholder="Key..." className="bg-transparent border-none outline-none text-[10px] w-full" value={apiKey} onChange={(e) => {setApiKey(e.target.value); setIsSaved(false);}} />
                                    {apiKey && !isSaved && <button onClick={saveKey} className="text-blue-600"><i data-lucide="save" className="w-3.5 h-3.5"></i></button>}
                                    {isSaved && <button onClick={clearKey} className="text-slate-400"><i data-lucide="trash-2" className="w-3.5 h-3.5"></i></button>}
                                </div>
                            </div>
                            <div className="flex gap-2 pt-0.5">
                                <button onClick={handleShare} className="p-3 bg-emerald-50 text-emerald-600 rounded-xl border border-emerald-100 active:scale-95 transition-all">
                                    {sharing ? <div className="w-5 h-5 border-2 border-emerald-600 border-t-transparent rounded-full animate-spin"></div> : <i data-lucide="share-2" className="w-5 h-5"></i>}
                                </button>
                                <label className={`p-3 rounded-xl shadow-lg transition-all cursor-pointer active:scale-95 ${apiKey ? 'bg-blue-600' : 'bg-slate-300 opacity-50'}`}>
                                    <i data-lucide="camera" className="w-5 h-5 text-white"></i>
                                    <input type="file" className="hidden" onChange={processImage} disabled={!apiKey} />
                                </label>
                            </div>
                        </div>
                    </header>

                    {loading ? (
                        <div className="flex-1 flex flex-col items-center justify-center bg-white">
                            <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                            <p className="mt-4 text-[10px] font-black text-slate-400 uppercase tracking-widest animate-pulse">Scanning Excel Data...</p>
                        </div>
                    ) : (
                        <main className="flex-1 flex flex-col p-3 gap-2 overflow-hidden bg-slate-50">
                            {/* Top Status Bar */}
                            <div className="flex bg-white rounded-xl border border-slate-200 px-4 h-10 items-center justify-between shadow-sm shrink-0">
                                <div className="flex items-center gap-2">
                                    <i data-lucide="calendar" className="w-4 h-4 text-blue-600"></i>
                                    <span className="text-[12px] font-black text-slate-800">{current.reportDate}</span>
                                </div>
                                <div className="h-4 w-px bg-slate-200"></div>
                                <div className="flex items-center gap-2">
                                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Live Sync</span>
                                </div>
                            </div>

                            {/* Main List Area */}
                            <div className="flex-1 flex flex-col gap-2 overflow-y-auto no-scrollbar pb-1">
                                {current.items.map((item, i) => <Card key={i} item={item} />)}
                                
                                {/* Bottom Summary Section (Renamed & Resized) */}
                                <div className="grid grid-cols-2 gap-2 mt-1 shrink-0 pb-4">
                                    <div className="bg-orange-600 rounded-2xl p-3 flex flex-col justify-center shadow-lg shadow-orange-100 h-[65px]">
                                        <span className="text-[8px] font-bold text-orange-200 uppercase tracking-tight leading-none">Visual Packing Pending</span>
                                        <div className="text-[18px] font-black text-white mt-1 leading-none">{current.pendingVisual.toLocaleString()}</div>
                                    </div>
                                    <div className="bg-slate-900 rounded-2xl p-3 flex flex-col justify-center shadow-lg shadow-slate-200 h-[65px]">
                                        <span className="text-[8px] font-bold text-slate-400 uppercase tracking-tight leading-none">Remaining Capacity</span>
                                        <div className="text-[18px] font-black text-white mt-1 leading-none">{daysRemaining} Days Left</div>
                                    </div>
                                </div>
                            </div>
                        </main>
                    )}

                    {/* HIDDEN EXPORT TEMPLATE - Optimized for One-Page WhatsApp Sharing */}
                    <div id="export-root">
                        <div className="border-b-4 border-slate-900 pb-4 mb-4">
                            <h1 className="text-3xl font-black text-slate-900 uppercase tracking-tighter leading-none">{current.title}</h1>
                            <div className="flex justify-between items-center mt-3">
                                <span className="text-blue-600 font-black text-sm uppercase tracking-widest">{current.subTitle}</span>
                                <span className="text-slate-400 font-bold text-[10px] uppercase">STATUS DATE: {current.reportDate}</span>
                            </div>
                        </div>
                        
                        <div className="flex flex-col gap-3">
                            {current.items.map((item, i) => <Card key={i} item={item} />)}
                        </div>

                        <div className="grid grid-cols-2 gap-3 mt-4">
                            <div className="bg-slate-50 border-2 border-slate-200 rounded-3xl p-5">
                                <span className="text-[10px] font-black text-slate-400 uppercase">Visual Packing Pending</span>
                                <div className="text-2xl font-black text-orange-600 mt-1">{current.pendingVisual.toLocaleString()} Units</div>
                            </div>
                            <div className="bg-slate-900 rounded-3xl p-5 text-white">
                                <span className="text-[10px] font-black text-slate-400 uppercase">Working Days Left</span>
                                <div className="text-2xl font-black mt-1">{daysRemaining} Days</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
