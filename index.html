<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCM Production Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #ffffff; color: #1e293b; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* HIDDEN 4K ULTRA-HD EXPORT ENGINE */
        #hd-report-render {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 600px;
            background: #ffffff;
            padding: 35px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .ach-tag {
            background: #f0f9ff;
            color: #0369a1;
            font-weight: 900;
            font-size: 11px;
            padding: 4px 14px;
            border-radius: 99px;
            border: 1.5px solid #e0f2fe;
            white-space: nowrap;
        }
    </style>
</head>
<body class="bg-slate-50 overflow-hidden">

    <div id="app" class="h-screen flex flex-col max-w-md mx-auto bg-white border-x border-slate-200">
        <!-- Header -->
        <header class="px-5 pt-6 pb-4 bg-white border-b border-slate-200 shrink-0">
            <div class="flex justify-between items-start">
                <div class="flex-1 mr-4">
                    <h1 class="text-xl font-black text-slate-900 leading-none uppercase tracking-tighter">PLAN VS ACTUAL</h1>
                    <p class="text-blue-600 text-[10px] font-black mt-1 uppercase tracking-widest leading-none">MARCH 2026</p>
                    <div class="mt-3 flex items-center bg-slate-50 border border-slate-200 rounded-lg px-2 h-8 focus-within:ring-1 ring-blue-500 transition-all">
                        <i data-lucide="key" id="key-icon" class="w-3.5 h-3.5 mr-2 text-slate-400"></i>
                        <input type="password" id="api-key-input" placeholder="Paste Gemini Key..." class="bg-transparent border-none outline-none text-[10px] w-full">
                        <button id="save-key-btn" class="text-blue-600 px-1 hidden"><i data-lucide="save" class="w-4 h-4"></i></button>
                        <button id="clear-key-btn" class="text-slate-400 px-1 hidden"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
                <div class="flex gap-2 pt-1">
                    <button id="share-btn" class="p-3 bg-emerald-50 text-emerald-600 rounded-2xl border border-emerald-100 active:scale-95 transition-all shadow-sm">
                        <i data-lucide="share-2" id="share-icon" class="w-5 h-5"></i>
                    </button>
                    <label class="p-3 bg-blue-600 rounded-2xl shadow-lg transition-all cursor-pointer active:scale-95 shadow-blue-200">
                        <i data-lucide="camera" class="w-5 h-5 text-white"></i>
                        <input type="file" id="image-upload" class="hidden" accept="image/*">
                    </label>
                </div>
            </div>
        </header>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="hidden flex-1 flex flex-col items-center justify-center bg-white p-10 text-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] animate-pulse">Analyzing 7-Mar Data...</p>
        </div>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 flex flex-col p-3 gap-2 overflow-hidden bg-slate-50">
            <!-- Date Bar -->
            <div class="flex bg-white rounded-2xl border border-slate-200 px-4 h-12 items-center justify-between shadow-sm shrink-0">
                <div class="flex items-center gap-3">
                    <i data-lucide="calendar" class="w-5 h-5 text-blue-600"></i>
                    <span id="date-display" class="text-[15px] font-black text-slate-800 tracking-tighter">7-Mar</span>
                </div>
                <div class="flex items-center gap-2.5">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Live Sync</span>
                </div>
            </div>

            <!-- Scrollable Grid -->
            <div id="items-container" class="flex-1 flex flex-col gap-2 overflow-y-auto no-scrollbar">
                <!-- Data will be injected here -->
            </div>

            <!-- Bottom Summary Boxes (Mi 11i Optimized) -->
            <div class="grid grid-cols-2 gap-2 mt-1 shrink-0 pb-10">
                <div class="bg-white border-2 border-orange-100 rounded-[24px] p-4 flex flex-col justify-center h-[75px] shadow-sm">
                    <span class="text-[9px] font-bold text-orange-400 uppercase leading-none mb-1">Visual Packing Pending</span>
                    <div id="pending-display" class="text-[20px] font-black text-orange-600 leading-none">126,447</div>
                </div>
                <div class="bg-slate-900 rounded-[24px] p-4 flex flex-col justify-center h-[75px] shadow-xl">
                    <span class="text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">Remaining Capacity</span>
                    <div id="days-display" class="text-[20px] font-black text-white leading-none">19 Days Left</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Export Template Area -->
    <div id="hd-report-render"></div>

    <script>
        // Use your 7-Mar latest data as the initial state
        let appData = {
            reportDate: "7-Mar",
            pendingVisual: 126447,
            items: [
                { name: "MACHINING/ABB", plan: 3113817, daily: 110592, cumm: 600613, mtd: 100102, askingRate: 139622 },
                { name: "Bearings To Supa", plan: 1180079, daily: 67871, cumm: 234489, mtd: 39082, askingRate: 49768 },
                { name: "Bearings To FC", plan: 3118119, daily: 87107, cumm: 536400, mtd: 89400, askingRate: 135880 },
                { name: "Bearings To FG", plan: 1297073, daily: 50280, cumm: 166089, mtd: 27682, askingRate: 59525 }
            ]
        };

        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent";
        const keyInput = document.getElementById('api-key-input');
        const saveKeyBtn = document.getElementById('save-key-btn');
        const clearKeyBtn = document.getElementById('clear-key-btn');
        const keyIcon = document.getElementById('key-icon');

        window.onload = () => {
            const savedKey = localStorage.getItem('scm_v35_key');
            if (savedKey) {
                keyInput.value = savedKey;
                updateKeyUI(true);
            }
            renderApp();
            lucide.createIcons();
        };

        function updateKeyUI(isSaved) {
            if (isSaved) {
                saveKeyBtn.classList.add('hidden');
                clearKeyBtn.classList.remove('hidden');
                keyIcon.classList.add('text-emerald-500');
            } else {
                saveKeyBtn.classList.remove('hidden');
                clearKeyBtn.classList.add('hidden');
                keyIcon.classList.add('text-slate-400');
            }
        }

        saveKeyBtn.onclick = () => { localStorage.setItem('scm_v35_key', keyInput.value); updateKeyUI(true); };
        clearKeyBtn.onclick = () => { localStorage.removeItem('scm_v35_key'); keyInput.value = ''; updateKeyUI(false); };
        keyInput.oninput = () => updateKeyUI(false);

        function renderApp() {
            const container = document.getElementById('items-container');
            // Strict sorting order: Machining, Supa, FC, FG
            const order = ["MACHINING/ABB", "Bearings To Supa", "Bearings To FC", "Bearings To FG"];
            const sortedItems = [...appData.items].sort((a, b) => order.indexOf(a.name) - order.indexOf(b.name));
            
            container.innerHTML = sortedItems.map(item => createCardHtml(item)).join('');
            
            document.getElementById('date-display').innerText = appData.reportDate;
            document.getElementById('pending-display').innerText = appData.pendingVisual.toLocaleString();
            
            const dayNum = parseInt(appData.reportDate.match(/(\d+)/)?.[0] || 7);
            document.getElementById('days-display').innerText = `${26 - dayNum} Days Left`;
            
            lucide.createIcons();
            updateExportTemplate(sortedItems);
        }

        function createCardHtml(item, isExport = false) {
            const ach = ((item.cumm / item.plan) * 100).toFixed(1);
            return `
                <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm flex flex-col gap-3">
                    <div class="flex justify-between items-center">
                        <h3 class="${isExport ? 'text-[17px]' : 'text-[13px]'} font-black text-slate-800 uppercase tracking-tight truncate pr-4">${item.name}</h3>
                        <div class="ach-tag">${ach}% ACHIEVED</div>
                    </div>
                    <div class="grid grid-cols-2 gap-x-6 gap-y-3">
                        <div class="flex flex-col leading-none">
                            <span class="text-[9px] font-bold text-slate-400 uppercase mb-1">Plan Target</span>
                            <span class="${isExport ? 'text-[18px]' : 'text-[15px]'} font-black text-slate-700">${item.plan.toLocaleString()}</span>
                        </div>
                        <div class="flex flex-col border-l border-slate-100 pl-4 leading-none">
                            <span class="text-[9px] font-bold text-slate-400 uppercase mb-1">${appData.reportDate} (Daily)</span>
                            <span class="${isExport ? 'text-[18px]' : 'text-[15px]'} font-black text-emerald-600">+${item.daily.toLocaleString()}</span>
                        </div>
                        <div class="flex flex-col leading-none">
                            <span class="text-[9px] font-bold text-blue-400 uppercase mb-1">Cumm. Achieved</span>
                            <span class="${isExport ? 'text-[18px]' : 'text-[15px]'} font-black text-blue-600">${item.cumm.toLocaleString()}</span>
                        </div>
                        <div class="flex flex-col border-l border-slate-100 pl-4 leading-none">
                            <span class="text-[9px] font-bold text-slate-400 uppercase mb-1">MTD Average</span>
                            <span class="${isExport ? 'text-[18px]' : 'text-[15px]'} font-black text-slate-700">${item.mtd.toLocaleString()}</span>
                        </div>
                        <div class="col-span-2 bg-slate-50 rounded-xl px-4 py-3 flex justify-between items-center border border-slate-100">
                            <span class="text-[10px] font-bold text-orange-500 uppercase tracking-tighter">Asking Rate Required</span>
                            <div class="flex items-baseline gap-1">
                                <span class="${isExport ? 'text-[22px]' : 'text-[18px]'} font-black text-orange-600 tracking-tighter">${item.askingRate.toLocaleString()}</span>
                                <span class="text-[9px] font-black text-orange-400 uppercase">u/day</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateExportTemplate(sortedItems) {
            const dayNum = parseInt(appData.reportDate.match(/(\d+)/)?.[0] || 7);
            const remaining = 26 - dayNum;
            const exportDiv = document.getElementById('hd-report-render');
            exportDiv.innerHTML = `
                <div class="border-b-[5px] border-slate-900 pb-5 mb-2 flex justify-between items-end">
                    <div>
                        <h1 class="text-[36px] font-black text-slate-900 uppercase tracking-tighter leading-none">PLAN VS ACTUAL</h1>
                        <p class="text-blue-600 font-black text-[14px] uppercase tracking-[0.4em] mt-1">MARCH 2026</p>
                    </div>
                    <span class="text-[14px] font-black text-slate-400 uppercase italic">REPORT DATE: ${appData.reportDate}</span>
                </div>
                <div class="flex flex-col gap-4">
                    ${sortedItems.map(item => createCardHtml(item, true)).join('')}
                </div>
                <div class="grid grid-cols-2 gap-4 mt-2">
                    <div class="bg-white border-[3px] border-orange-100 rounded-[32px] p-7 flex flex-col justify-center shadow-sm">
                        <span class="text-[13px] font-black text-orange-400 uppercase mb-1">Visual Packing Pending</span>
                        <div class="text-[28px] font-black text-orange-600 leading-none">${appData.pendingVisual.toLocaleString()} Units</div>
                    </div>
                    <div class="bg-slate-900 rounded-[32px] p-7 flex flex-col justify-center shadow-2xl">
                        <span class="text-[13px] font-black text-slate-500 uppercase mb-1">Remaining Capacity</span>
                        <div class="text-[28px] font-black text-white leading-none">${remaining} Days Left</div>
                    </div>
                </div>
            `;
        }

        document.getElementById('image-upload').onchange = async (e) => {
            const file = e.target.files[0];
            const key = localStorage.getItem('scm_v35_key');
            if (!file || !key) { alert("Save API Key first."); return; }

            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');

            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64 = reader.result.split(',')[1];
                try {
                    const prompt = `
                        Analyze the production table strictly. Extract into JSON:
                        {
                          "reportDate": "Extract exact date from yellow column (e.g. 7-Mar)",
                          "items": [
                            {"name": "Product Name", "plan": number, "daily": number, "cumm": number, "mtd": number, "askingRate": number}
                          ],
                          "pendingVisual": "The value from the bottom merged cell 'Pending for visual/Packing'"
                        }
                        Instructions:
                        1. Identify the column header that looks like a date (e.g., 7-Mar). Map values in that column to 'daily'.
                        2. Map 'Cumm ACH' column to 'cumm'.
                        3. Map 'MTD Average' column to 'mtd'.
                        4. Return ONLY the raw JSON.
                    `;
                    
                    const response = await fetch(`${API_URL}?key=${key}`, {
                        method: 'POST',
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64 } }] }] })
                    });
                    
                    const result = await response.json();
                    const text = result.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                    appData = JSON.parse(text);
                    renderApp();
                } catch (err) {
                    alert("Analysis Failed. Ensure photo is well-lit and shows the full table.");
                } finally {
                    document.getElementById('loading-overlay').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                }
            };
            reader.readAsDataURL(file);
        };

        document.getElementById('share-btn').onclick = async () => {
            const shareIcon = document.getElementById('share-icon');
            shareIcon.classList.add('animate-spin');
            try {
                const element = document.getElementById('hd-report-render');
                const canvas = await html2canvas(element, { scale: 4, useCORS: true, backgroundColor: '#ffffff' });
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                const file = new File([blob], `SCM_Report_${appData.reportDate}.png`, { type: 'image/png' });

                if (navigator.share) {
                    await navigator.share({ files: [file], title: `Production Report - ${appData.reportDate}` });
                } else {
                    window.open(URL.createObjectURL(blob));
                }
            } catch (err) { alert("Share failed."); } finally { shareIcon.classList.remove('animate-spin'); }
        };
    </script>
</body>
</html>
